services:
  alice:
    build: .
    volumes:
      - alice-data:/apoci/storage
    environment:
      # No config file is mounted; unset the image's baked APOCI_CONFIG so a
      # missing file falls back to these env vars instead of erroring.
      APOCI_CONFIG: ""
      APOCI_ENDPOINT: "http://alice.test:5000"
      APOCI_ADMIN_TOKEN: "alice-e2e-token"
      APOCI_REGISTRY_TOKEN: "alice-registry-token"
      APOCI_LOG_LEVEL: "debug"
      APOCI_LOG_FORMAT: "text"
      APOCI_FEDERATION_AUTO_ACCEPT: "all"
      APOCI_FEDERATION_ALLOW_INSECURE_HTTP: "true"
    networks:
      default:
        aliases:
          - alice.test
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  bob:
    build: .
    volumes:
      - bob-data:/apoci/storage
    environment:
      APOCI_CONFIG: ""
      APOCI_ENDPOINT: "http://bob.test:5000"
      APOCI_ADMIN_TOKEN: "bob-e2e-token"
      APOCI_REGISTRY_TOKEN: "bob-registry-token"
      APOCI_LOG_LEVEL: "debug"
      APOCI_LOG_FORMAT: "text"
      APOCI_FEDERATION_AUTO_ACCEPT: "all"
      APOCI_FEDERATION_ALLOW_INSECURE_HTTP: "true"
    networks:
      default:
        aliases:
          - bob.test
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  charlie:
    build: .
    volumes:
      - charlie-data:/apoci/storage
    environment:
      APOCI_CONFIG: ""
      APOCI_ENDPOINT: "http://charlie.test:5000"
      APOCI_ADMIN_TOKEN: "charlie-e2e-token"
      APOCI_REGISTRY_TOKEN: "charlie-registry-token"
      APOCI_LOG_LEVEL: "debug"
      APOCI_LOG_FORMAT: "text"
      APOCI_FEDERATION_AUTO_ACCEPT: "none"
      APOCI_FEDERATION_ALLOW_INSECURE_HTTP: "true"
      APOCI_FEDERATION_BLOCKED_DOMAINS: "blocked.example.com"
      APOCI_FEDERATION_BLOCKED_ACTORS: "http://blocked-actor.example.com/ap/actor"
    networks:
      default:
        aliases:
          - charlie.test
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  e2e:
    build: tests/e2e
    depends_on:
      alice:
        condition: service_healthy
      bob:
        condition: service_healthy
      charlie:
        condition: service_healthy

volumes:
  alice-data:
  bob-data:
  charlie-data:
