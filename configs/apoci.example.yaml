endpoint: "https://registry.example.com"

# All fields below are optional — defaults shown

# name: "registry.example.com"   # defaults to domain from endpoint
# listen: ":5000"
# dataDir: "~/.apoci"            # defaults to $HOME/.apoci
# keyPath: "/apoci/storage/ap.key"
# registryToken: ""              # auto-generated to {dataDir}/registry.token if empty
# adminToken: ""                 # auto-generated to {dataDir}/admin.token if empty (separate from registryToken)
# accountDomain: "example.com"  # vanity domain for WebFinger (defaults to endpoint domain)

# storage:
#   type: local        # local (default) or s3
#   s3:
#     bucket: ""                # required for s3
#     region: "us-east-1"
#     endpoint: ""              # custom endpoint for MinIO / S3-compatible stores
#     accessKey: ""             # leave empty to use the default credential chain
#     secretKey: ""
#     prefix: ""                # optional key prefix inside the bucket
#     forcePathStyle: false     # set to true for MinIO and some compatible stores
#     tempDir: ""               # temp dir for upload staging; defaults to OS temp dir

# database:
#   driver: sqlite     # sqlite (default) or postgres
#   dsn: ""            # required for postgres, e.g. "postgres://user:pass@localhost:5432/apoci?sslmode=disable"
#   maxOpenConns: 0    # max open connections (0 = default: 4 for sqlite, 25 for postgres)
#   maxIdleConns: 0    # max idle connections (0 = default: 4 for sqlite, 10 for postgres)

# logLevel: info     # debug, info, warn, error
# logFormat: json    # json, text

# tls:
#   cert: /etc/apoci/tls.crt
#   key: /etc/apoci/tls.key

# peering:
#   healthCheckInterval: 30s
#   fetchTimeout: 60s

# federation:
#   autoAccept: none           # none, mutual, or all
#   allowInsecureHTTP: false   # allow plain HTTP federation (testing only)
#   allowedDomains: []         # always auto-accept follows from these domains
#   blockedDomains: []         # silently drop all activities from these domains
#   blockedActors: []          # silently drop all activities from these actor URLs

# gc:
#   enabled: true              # set to false to disable background garbage collection
#   interval: 6h               # how often to run GC
#   stalePeerBlobAge: 720h     # remove peer blob refs older than this (720h = 30 days)
#   orphanBatchSize: 500       # max orphaned blobs to process per cycle

# limits:
#   maxManifestSize: 10485760     # 10 MB
#   maxBlobSize: 536870912        # 512 MB

# notifications:
#   urls:                              # shoutrrr notification URLs (see https://nicholas-fedor.github.io/shoutrrr)
#     - "discord://token@id"
#     - "slack://token:token:token@channel"
#   events:                            # which events to notify on (empty = none)
#     - peer_health                    # peer goes up or down
#     - follow_request                 # new follow request received
#     - replication_failure            # blob replication failed
#     - gc_error                       # garbage collection errors

# metrics:
#   enabled: true
#   listen: ":9090"
#   token: ""                     # bearer token for /debug/vars (optional, unauthenticated if empty)

# upstreams:
#   enabled: false
#   fetchTimeout: 60s
#   registries:
#     - name: docker.io
#       endpoint: "https://registry-1.docker.io"
#       # auth: token             # none, basic, or token (default: token)
#       # username: ""            # leave empty for anonymous pulls
#       # password: ""
#     - name: ghcr.io
#       endpoint: "https://ghcr.io"
#       username: myuser          # optional: for private repos
#       password: "ghp_yourtoken"
#       private: true             # require auth to pull cached images through apoci

# ui:
#   enabled: false               # enable web UI at / to browse images

# backends:
#   npm:
#     enabled: true              # default true; false skips routes + federation entirely
#     federate: true             # default true; false serves clients but doesn't broadcast or accept inbound activities
#     token: ""                  # default empty -> falls back to the global registryToken
#   cargo:
#     enabled: true
#   pypi:
#     enabled: true
