name: Build and push container images
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-images:
    runs-on: multiarch
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6
      - uses: https://data.forgejo.org/docker/setup-buildx-action@v4
      - name: Compute build timestamp
        id: build-meta
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Login to git.erwanleboucher.dev
        uses: https://data.forgejo.org/docker/login-action@v4
        with:
          registry: git.erwanleboucher.dev
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.OWNER_PACKAGE_SECRET }}
      - name: Compute image metadata
        id: meta
        uses: https://data.forgejo.org/docker/metadata-action@v6
        with:
          images: |
            git.erwanleboucher.dev/${{ vars.USERNAME }}/apoci
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=apoci
            org.opencontainers.image.description=apoci — federated, self-hostable multi-format (OCI, npm, Cargo, PyPI) registry that publishes artifacts as an ActivityPub actor
            org.opencontainers.image.documentation=https://git.erwanleboucher.dev/eleboucher/apoci/src/branch/main/README.md
            org.opencontainers.image.authors=Erwan Leboucher <erwanleboucher@gmail.com>
            org.opencontainers.image.vendor=Erwan Leboucher
      - name: Build and push
        uses: https://data.forgejo.org/docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.build-meta.outputs.created }}
