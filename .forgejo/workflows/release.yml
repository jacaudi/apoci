---
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  goreleaser:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        run: curl -sfL https://goreleaser.com/static/run | VERSION=v2.15.2 bash -s -- release --clean
        env:
          GORELEASER_FORCE_TOKEN: gitea
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_SERVER_URL: https://git.erwanleboucher.dev

  container:
    runs-on: multiarch
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v7

      - uses: https://data.forgejo.org/docker/setup-buildx-action@v4

      - name: Login to git.erwanleboucher.dev
        uses: https://data.forgejo.org/docker/login-action@v4
        with:
          registry: git.erwanleboucher.dev
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.OWNER_PACKAGE_SECRET }}

      - name: Login to registry.erwanleboucher.dev
        uses: https://data.forgejo.org/docker/login-action@v4
        with:
          registry: registry.erwanleboucher.dev
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.APOCI_REGISTRY_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: https://data.forgejo.org/docker/metadata-action@v6
        with:
          images: |
            git.erwanleboucher.dev/${{ vars.USERNAME }}/apoci
            registry.erwanleboucher.dev/${{ vars.USERNAME }}/apoci
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: https://data.forgejo.org/docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
